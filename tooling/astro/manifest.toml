[stack]
name = "astro"
extends = "web"
runtime = "bun"
scaffold = "bun create astro@latest {{name}} -- --template minimal --typescript strict --no-install --no-git --skip-houston --yes"

[dependencies.dev]
packages = [
  "astro",
  "@astrojs/react",
  "@astrojs/check",
  "eslint-plugin-astro",
  "astro-eslint-parser",
  "prettier-plugin-astro",
]

[scripts]
"dev" = "astro dev"
"build" = "astro check && astro build"
"preview" = "astro preview"
"astro" = "astro"
"typecheck" = "astro check"
"setup" = "./scripts/setup.sh"
"screenshot" = "bun run build && bun run preview & sleep 2 && node --experimental-strip-types e2e/screenshot.ts"

[gitignore]
"# Astro" = [".astro/"]
